<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #1f2937;
      line-height: 1.6;
    }
    .container {
      max-width: 760px;
      margin: 24px auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: #ffffff;
      padding: 24px 28px;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }
    .meta {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.9;
    }
    .content {
      padding: 24px 28px 16px;
    }
    .section {
      margin-bottom: 24px;
    }
    .section h2 {
      font-size: 20px;
      margin: 0 0 10px;
      color: #0f172a;
    }
    .section h3 {
      font-size: 17px;
      margin: 0 0 8px;
      color: #0f172a;
    }
    .section h4 {
      font-size: 15px;
      margin: 12px 0 6px;
      color: #334155;
    }
    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .blog p, .blog li {
      font-size: 15px;
    }
    .blog h1, .blog h2, .blog h3 {
      color: #111827;
      line-height: 1.35;
    }
    .footer {
      border-top: 1px solid #e5e7eb;
      padding: 14px 28px 20px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">Generated at {{DATE}}</div>
    </div>
    <div class="content">
      <div class="section">
        <h2>Executive Summary</h2>
        <div class="card">{{SUMMARY}}</div>
      </div>
      <div class="section">
        <h2>Key Points</h2>
        <ul>{{KEY_POINTS}}</ul>
      </div>
      <div class="section">
        {{ANALYTICS}}
      </div>
      <div class="section blog">
        <h2>Full Blog Article</h2>
        {{BLOG_CONTENT}}
      </div>
    </div>
    <div class="footer">
      This email was generated automatically by the AI News Auto-Blogger pipeline.
    </div>
  </div>
</body>
</html>
